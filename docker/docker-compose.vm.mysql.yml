services:
  xiaozhi-server:
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WAIT_FOR_DATABASE_HOST: mysql
      WAIT_FOR_DATABASE_PORT: 3306
      WAIT_FOR_REDIS_HOST: "${WAIT_FOR_REDIS_HOST:-redis}"
      WAIT_FOR_REDIS_PORT: "${WAIT_FOR_REDIS_PORT:-6379}"
      XIAOZHI_DATABASE_DRIVER: mysql
      XIAOZHI_DATABASE_DSN: "root:${MYSQL_ROOT_PASSWORD:-change-me}@tcp(mysql:3306)/${MYSQL_DATABASE:-xiaozhi}?charset=utf8mb4&parseTime=True&loc=Local"
      XIAOZHI_REDIS_HOST: "${XIAOZHI_REDIS_HOST:-redis}"
      XIAOZHI_REDIS_PORT: "${XIAOZHI_REDIS_PORT:-6379}"
    networks:
      - default
      - shared_redis

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-change-me}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-xiaozhi}"
      TZ: "${TZ:-Asia/Bangkok}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+07:00
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

networks:
  shared_redis:
    external: true
    name: "${SHARED_REDIS_NETWORK:-protexa_default}"
